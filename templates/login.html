<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirish — PinokioAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --panel: #0a0a0a; --fire: #ff4d00; --border: #1a1a1a; --text: #888; }
        body {
            font-family: 'Sora', sans-serif; background: var(--bg); color: #fff;
            display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0;
        }
        .login-card {
            width: 100%; max-width: 400px; padding: 40px; background: var(--panel);
            border: 1px solid var(--border); border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
        }
        .logo { font-size: 1.5rem; font-weight: 800; margin-bottom: 30px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .logo-dot { width: 12px; height: 12px; background: var(--fire); border-radius: 50%; box-shadow: 0 0 15px var(--fire); }
        
        h1 { font-size: 1.8rem; margin-bottom: 10px; font-weight: 700; }
        p { color: var(--text); font-size: 0.9rem; margin-bottom: 30px; }

        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 0.8rem; color: var(--text); margin-bottom: 8px; margin-left: 5px; }
        input {
            width: 100%; background: #111; border: 1px solid var(--border); padding: 14px;
            border-radius: 12px; color: #fff; font-family: inherit; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--fire); box-shadow: 0 0 0 4px rgba(255, 77, 0, 0.1); }

        .btn-login {
            width: 100%; background: var(--fire); color: #fff; border: none; padding: 16px;
            border-radius: 12px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn-login:hover { background: #ff7033; transform: translateY(-2px); }

        .footer-link { margin-top: 25px; font-size: 0.85rem; color: var(--text); }
        .footer-link a { color: var(--fire); text-decoration: none; font-weight: 600; }
        
        .error-msg { background: rgba(255, 0, 0, 0.1); color: #ff4444; padding: 10px; border-radius: 8px; font-size: 0.8rem; margin-bottom: 20px; border: 1px solid rgba(255, 0, 0, 0.2); }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo"><div class="logo-dot"></div> PinokioAI</div>
    <h1>Qaytib keldingiz!</h1>
    <p>Davom eting — AI sizni kutmoqda</p>

    {% if error %}
        <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form action="/login" method="POST">
        <div class="form-group">
            <label>Email manzili</label>
            <input type="email" name="email" placeholder="siz@email.uz" required>
        </div>
        <div class="form-group">
            <label>Parol</label>
            <input type="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-login">Hisobga kirish →</button>
    </form>

    <div class="footer-link">
        Hisobingiz yo'qmi? <a href="/register">Ro'yxatdan o'tish →</a>
    </div>
</div>

</body>
</html>
