<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PinokioAI{% endblock %}</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='pinokioai.png') }}">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000; 
            --panel: #0a0a0a; 
            --fire: #ff4d00; 
            --border: #1a1a1a; 
            --text-gray: #888;
            --text-white: #fff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Sora', sans-serif; 
            background: var(--bg); 
            color: var(--text-white); 
            height: 100vh; 
            display: flex; 
            overflow: hidden; 
        }

        /* SIDEBAR */
        .sidebar { 
            width: 280px; 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            padding: 20px; 
            background: var(--bg);
        }
        .logo { 
            font-size: 1.2rem; 
            font-weight: 700; 
            margin-bottom: 40px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            color: var(--text-white);
            text-decoration: none;
        }
        .logo-dot { 
            width: 10px; height: 10px; 
            background: var(--fire); 
            border-radius: 50%; 
            box-shadow: 0 0 15px var(--fire); 
        }
        
        .nav-menu { flex: 1; display: flex; flex-direction: column; gap: 8px; }

        .nav-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px; color: var(--text-gray);
            text-decoration: none; border-radius: 12px;
            transition: 0.3s; font-size: 0.9rem;
        }

        .nav-item:hover, .nav-item.active {
            background: #111; color: var(--text-white);
        }
        .nav-item.active { border-left: 3px solid var(--fire); border-radius: 4px 12px 12px 4px; }
        .nav-item svg { width: 18px; height: 18px; }

        .logout-link {
            color: #ff4444; text-decoration: none; padding: 12px 16px;
            font-size: 0.9rem; transition: 0.3s; display: flex; align-items: center; gap: 12px;
        }
        .logout-link:hover { background: rgba(255, 68, 68, 0.1); border-radius: 12px; }

        /* MAIN CONTENT */
        .main-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        
        .top-header { 
            padding: 15px 30px; 
            display: flex; 
            justify-content: flex-end; 
            border-bottom: 1px solid var(--border); 
            background: var(--bg);
        }
        .user-pill { 
            display: flex; align-items: center; gap: 10px; 
            padding: 5px 15px; border: 1px solid var(--border); 
            border-radius: 20px; font-size: 0.85rem; color: var(--text-white);
        }
        .avatar-circle {
            width: 25px; height: 25px; 
            background: var(--fire); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 10px; font-weight: bold;
        }

        .content-area { flex: 1; overflow-y: auto; padding: 30px; position: relative; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <a href="/" class="logo"><div class="logo-dot"></div> PinokioAI</a>
        
        <nav class="nav-menu">
            <a href="/dashboard" class="nav-item {% if request.path == '/dashboard' %}active{% endif %}">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                Bosh sahifa
            </a>
            <a href="/chat" class="nav-item {% if request.path == '/chat' %}active{% endif %}">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                Chatlar
            </a>
            <a href="/settings" class="nav-item {% if request.path == '/settings' %}active{% endif %}">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                Sozlamalar
            </a>
        </nav>

        {% if user %}
        <a href="/logout" class="logout-link">
            <svg style="width:18px;height:18px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            Chiqish
        </a>
        {% endif %}
    </aside>

    <div class="main-container">
        <header class="top-header">
            {% if user %}
            <div class="user-pill">
                {{ user.username }} 
                <div class="avatar-circle">{{ user.username[0].upper() }}</div>
            </div>
            {% else %}
            <div style="display: flex; gap: 10px;">
                <a href="/login" style="color: var(--text-gray); text-decoration: none; font-size: 0.85rem;">Kirish</a>
                <a href="/register" style="color: var(--fire); text-decoration: none; font-size: 0.85rem; font-weight: bold;">Ro'yxatdan o'tish</a>
            </div>
            {% endif %}
        </header>
        
        <div class="content-area">
            {% block content %}{% endblock %}
        </div>
    </div>
</body>
</html>
